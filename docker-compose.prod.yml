services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-serenity}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - serenity-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-serenity}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-serenity}?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      APP_URL: ${APP_URL:-https://aged-care.downundersolutions.com}
    expose:
      - "3000"
    networks:
      default: {}
      caddy_shared:
        aliases:
          - ${CADDY_UPSTREAM_ALIAS:-serenity-aged-care-app}

networks:
  caddy_shared:
    external: true
    name: ${CADDY_SHARED_NETWORK:-shared_caddy_net}

volumes:
  serenity-postgres-data: